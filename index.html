<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cookie Clicker Ultra</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle at top, #1f1f1f, #0d0d0d);
  color: white;
  text-align: center;
}

h1 {
  margin-top: 10px;
  font-size: 28px;
}

#stats {
  margin: 10px;
}

#cookie {
  width: 160px;
  cursor: pointer;
  transition: transform 0.1s;
  filter: drop-shadow(0 0 10px orange);
}
#cookie:active {
  transform: scale(0.9);
}
.pop {
  transform: scale(1.2);
}

.panel {
  background: #1a1a1a;
  margin: 15px auto;
  padding: 15px;
  border-radius: 15px;
  width: 90%;
  max-width: 400px;
  box-shadow: 0 0 15px #000;
}

button {
  width: 100%;
  padding: 12px;
  margin: 6px 0;
  border-radius: 10px;
  border: none;
  background: linear-gradient(45deg, #ff9900, #ff5500);
  color: white;
  font-weight: bold;
}

.badge {
  background: gold;
  color: black;
  padding: 5px;
  margin: 4px;
  border-radius: 6px;
  display: inline-block;
}
</style>
</head>

<body>

<h1>🍪 Cookie Clicker Ultra</h1>

<div id="stats">
<h2 id="cookies">0 cookies</h2>
<div id="cps">0 / sec</div>
<div>💎 Gems: <span id="gems">0</span></div>
</div>

<!-- COOKIE SVG -->
<svg id="cookie" viewBox="0 0 200 200">
  <circle cx="100" cy="100" r="80" fill="#c97a3a"/>
  <circle cx="70" cy="80" r="8" fill="#3b2a1a"/>
  <circle cx="120" cy="60" r="7" fill="#3b2a1a"/>
  <circle cx="130" cy="120" r="9" fill="#3b2a1a"/>
  <circle cx="80" cy="130" r="6" fill="#3b2a1a"/>
  <circle cx="100" cy="100" r="5" fill="#3b2a1a"/>
</svg>

<div class="panel">
<h3>🛒 Boutique</h3>
<button onclick="buy('cursor')">Curseur +1 CPS (<span id="c1">10</span>)</button>
<button onclick="buy('farm')">Ferme +5 CPS (<span id="c2">50</span>)</button>
<button onclick="buy('factory')">Usine +20 CPS (<span id="c3">200</span>)</button>
</div>

<div class="panel">
<h3>🏆 Succès</h3>
<div id="achievements"></div>
</div>

<button onclick="resetGame()">🔁 Restart</button>

<audio id="clickSound">
<source src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA=">
</audio>

<script>
let cookies = 0;
let cps = 0;
let gems = 0;

let upgrades = {
  cursor:{cost:10,cps:1},
  farm:{cost:50,cps:5},
  factory:{cost:200,cps:20}
};

let achievements = {
  first:false,
  hundred:false,
  thousand:false
};

const cookie = document.getElementById("cookie");

cookie.onclick = () => {
  cookies++;

  // animation
  cookie.classList.add("pop");
  setTimeout(()=>cookie.classList.remove("pop"),100);

  // son
  clickSound.currentTime = 0;
  clickSound.play();

  // succès
  if(cookies>=1) achievements.first=true;
  if(cookies>=100) achievements.hundred=true;
  if(cookies>=1000) achievements.thousand=true;

  update();
};

function buy(item){
  let u = upgrades[item];
  if(cookies>=u.cost){
    cookies-=u.cost;
    cps+=u.cps;
    u.cost=Math.floor(u.cost*1.4);
    update();
  }
}

setInterval(()=>{
  cookies+=cps;

  if(Math.floor(cookies)%100===0 && cookies>0){
    gems++;
  }

  update();
},1000);

function update(){
  document.getElementById("cookies").innerText=Math.floor(cookies)+" cookies";
  document.getElementById("cps").innerText=cps+" / sec";
  document.getElementById("gems").innerText=gems;

  c1.innerText=upgrades.cursor.cost;
  c2.innerText=upgrades.farm.cost;
  c3.innerText=upgrades.factory.cost;

  let html="";
  if(achievements.first) html+="<div class='badge'>1er clic</div>";
  if(achievements.hundred) html+="<div class='badge'>100 cookies</div>";
  if(achievements.thousand) html+="<div class='badge'>1000 cookies</div>";

  document.getElementById("achievements").innerHTML=html;
}

function resetGame(){
  location.reload();
}

update();
</script>

</body>
</html>
